<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Box Muncher Pro</title>
  <style>
    body { margin:0; font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #e0e0ff; text-align: center; }
    .hero { padding: 120px 20px; background: linear-gradient(135deg, #ff6b6b, #4ecdc4); }
    h1 { font-size: 5rem; margin: 0; text-shadow: 0 0 20px rgba(255,255,255,0.5); }
    p { font-size: 1.8rem; max-width: 800px; margin: 20px auto; }
    .cta { margin: 50px; }
    button { background: #fff; color: #333; border: none; padding: 18px 50px; font-size: 1.5rem; border-radius: 50px; cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.4); transition: all 0.3s; }
    button:hover { transform: scale(1.08); background: #ffeb3b; }
  </style>
</head>
<body>
  <div class="hero">
    <h1>Box Muncher Pro</h1>
    <p>Level up your box-munching game. Professional crunching. Zero mercy.</p>
  </div>
  <div class="cta">
    <button onclick="alert('Munch mode: ACTIVATED! Coming soon.')">Start Munching</button>
  </div>
</body>
</html>
